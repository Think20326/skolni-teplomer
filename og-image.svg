<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="50%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bfdbfe" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#bfdbfe" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="blob2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a7f3d0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a7f3d0" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="60"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="50"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <circle cx="120" cy="100" r="280" fill="url(#blob1)" filter="url(#blur1)"/>
  <circle cx="1080" cy="530" r="240" fill="url(#blob2)" filter="url(#blur2)"/>

  <!-- Card -->
  <rect x="160" y="140" width="880" height="350" rx="28" ry="28"
        fill="rgba(255,255,255,0.65)" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>

  <!-- Thermometer icon -->
  <g transform="translate(272, 250)">
    <rect x="10" y="0" width="20" height="80" rx="10" fill="none" stroke="#3b82f6" stroke-width="4"/>
    <rect x="14" y="30" width="12" height="55" rx="6" fill="#3b82f6"/>
    <circle cx="20" cy="100" r="16" fill="#3b82f6"/>
    <line x1="32" y1="20" x2="40" y2="20" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <line x1="32" y1="35" x2="40" y2="35" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <line x1="32" y1="50" x2="40" y2="50" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Main title -->
  <text x="600" y="280" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="800"
        fill="#1e293b" text-anchor="middle" letter-spacing="-1">Školní teploměr</text>

  <!-- Subtitle -->
  <text x="600" y="355" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="500"
        fill="#475569" text-anchor="middle">Teplota pro cestu do školy a ze školy</text>

  <!-- URL -->
  <text x="600" y="440" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="400"
        fill="#94a3b8" text-anchor="middle">skolniteplomer.cz</text>
</svg>
